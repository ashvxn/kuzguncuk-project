<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çok Yakında!</title>
    <style>
        /* Modern Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfaf7; /* Soft cream background */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            animation: fadeIn 1.5s ease-in-out;
        }

        .image-wrapper img {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 1px;
            font-size: 1.8rem;
            line-height: 1.4;
        }

        .accent {
            display: block;
            margin-top: 10px;
            font-weight: 600;
            color: #d35400; /* Warm terracotta color */
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 3px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="image-wrapper">
            <img src="kuzguncuk.jpg" alt="Kuzguncuk">
        </div>
        <h1>Çok yakında Kuzguncuk’tayız.</h1>
        <!-- <span class="accent">Bizi Takip Edin</span> -->
    </div>

</body>
</html>
